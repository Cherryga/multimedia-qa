spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/multimedia_qa}
    username: ${SPRING_DATASOURCE_USERNAME:multimedia}
    password: ${SPRING_DATASOURCE_PASSWORD:multimedia}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

app:
  storage:
    path: ${APP_STORAGE_PATH:storage}
  openai:
    api-key: ${OPENAI_API_KEY}
    base-url: ${OPENAI_BASE_URL:https://api.groq.com/openai/v1}
    chat-model: ${OPENAI_CHAT_MODEL:llama-3.3-70b-versatile}
    transcription-model: ${OPENAI_TRANSCRIPTION_MODEL:whisper-large-v3}

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
